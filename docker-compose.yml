# ==============================================================================
# DocuMentor — Docker Compose
# ==============================================================================
# Starts SurfSense (RAG backend) + MCP Wrapper + Hermes Agent + Bridge
#
# Usage:
#   1. cp .env.example .env && nano .env   (fill in REQUIRED fields)
#   2. docker compose up -d
#   3. cd frontend && npm install && npm run dev
#   4. Open http://localhost:3000
# ==============================================================================

name: documenter

include:
  # SurfSense services (db, redis, searxng, backend, celery, electric, frontend)
  - path: ./SurfSense/docker/docker-compose.yml
    env_file: .env

services:

  # ----------------------------------------------------------------------------
  # DocuMentor MCP Wrapper
  # Exposes SurfSense as 25 MCP tools for the Hermes agent
  # ----------------------------------------------------------------------------
  mcp-wrapper:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    command: python /app/mcp_server.py
    volumes:
      - upload-tmp:/tmp/documenter-uploads
      - ./surfsense-skill/mcp_server.py:/app/mcp_server.py:ro
    ports:
      - "${MCP_PORT:-8000}:8000"
    env_file: .env
    environment:
      SURFSENSE_BASE_URL: ${SURFSENSE_BASE_URL:-http://backend:8000}
      SURFSENSE_EMAIL: ${SURFSENSE_EMAIL:-admin@documenter.app}
      SURFSENSE_PASSWORD: ${SURFSENSE_PASSWORD:-changeme}
      MCP_PORT: "8000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------------
  # Hermes Agent Service
  # AI reasoning engine — receives queries from bridge via HTTP/SSE
  # Calls MCP tools on mcp-wrapper for document intelligence
  # ----------------------------------------------------------------------------
  hermes:
    build:
      context: .
      dockerfile: hermes-service/Dockerfile
    command: python server.py
    volumes:
      - ./hermes-service/hermes-config.yaml:/root/.hermes/config.yaml:ro
    ports:
      - "${HERMES_PORT:-8002}:8002"
    env_file: .env
    environment:
      HERMES_PORT: "8002"
      HERMES_AGENT_DIR: /app/hermes-agent
      HERMES_HOME: /root/.hermes
      HERMES_MODEL: ${HERMES_MODEL:-qwen/qwen3-235b-a22b}
      HERMES_BASE_URL: ${HERMES_BASE_URL:-https://openrouter.ai/api/v1}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_POOL_SIZE: ${HERMES_POOL_SIZE:-3}
      MCP_URL: http://mcp-wrapper:8000/mcp/
    depends_on:
      mcp-wrapper:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------------------------------------------
  # DocuMentor Bridge
  # WebSocket gateway — routes queries to Hermes (HTTP/SSE) or direct MCP
  # Automatic fallback: if Hermes is down, queries go direct to MCP wrapper
  # ----------------------------------------------------------------------------
  bridge:
    build:
      context: ./backend
      dockerfile: Dockerfile.bridge
    command: python bridge.py
    volumes:
      - upload-tmp:/tmp/documenter-uploads
    ports:
      - "${BRIDGE_PORT:-8001}:8001"
    env_file: .env
    environment:
      MCP_URL: http://mcp-wrapper:8000
      BRIDGE_PORT: "8001"
      HERMES_URL: http://hermes:8002
      DOCUMENTER_AUTH: ${DOCUMENTER_AUTH:-true}
      DOCUMENTER_EMAIL: ${DOCUMENTER_EMAIL:-admin@documenter.local}
      DOCUMENTER_PASSWORD: ${DOCUMENTER_PASSWORD:-}
      SECRET_KEY: ${SECRET_KEY:-}
    depends_on:
      mcp-wrapper:
        condition: service_healthy
      hermes:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  upload-tmp:

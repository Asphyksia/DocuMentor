# ==============================================================================
# DocuMentor — Docker Compose
# ==============================================================================
# Starts SurfSense (RAG backend) + DocuMentor MCP Wrapper
#
# Usage:
#   1. cp .env.example .env && nano .env   (fill in REQUIRED fields)
#   2. docker compose up -d
#   3. cd frontend && npm install && npm run dev
#   4. Open http://localhost:3000
# ==============================================================================

name: documenter

include:
  # SurfSense services (db, redis, searxng, backend, celery, electric, frontend)
  - path: ./SurfSense/docker/docker-compose.yml
    env_file: .env

services:

  # ----------------------------------------------------------------------------
  # DocuMentor MCP Wrapper
  # Exposes SurfSense as tools for the Hermes agent
  # ----------------------------------------------------------------------------
  mcp-wrapper:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    command: python /app/mcp_server.py
    volumes:
      - upload-tmp:/tmp/documenter-uploads
      - ./surfsense-skill/mcp_server.py:/app/mcp_server.py:ro
    ports:
      - "${MCP_PORT:-8000}:8000"
    env_file: .env
    environment:
      SURFSENSE_BASE_URL: ${SURFSENSE_BASE_URL:-http://backend:8000}
      SURFSENSE_EMAIL: ${SURFSENSE_EMAIL:-admin@documenter.app}
      SURFSENSE_PASSWORD: ${SURFSENSE_PASSWORD:-changeme}
      MCP_PORT: "8000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------------------
  # DocuMentor Bridge
  # WebSocket server — intelligent gateway between dashboard and Hermes/MCP
  #
  # The bridge imports Hermes AIAgent for query routing. When HERMES_API_KEY
  # is set, queries go through Hermes (reasoning + tool use). Otherwise falls
  # back to direct MCP calls.
  #
  # NOTE: For Hermes integration, the bridge needs access to hermes-agent source
  # and its config. If running in Docker, mount the hermes-agent dir and config.
  # For development, run the bridge outside Docker:
  #   cd backend && python bridge.py
  # ----------------------------------------------------------------------------
  bridge:
    build:
      context: ./backend
      dockerfile: Dockerfile.bridge
    command: python bridge.py
    volumes:
      - upload-tmp:/tmp/documenter-uploads
      - ./hermes-agent:/app/hermes-agent:ro
      - ${HERMES_HOME:-~/.hermes}:/root/.hermes:ro
    ports:
      - "${BRIDGE_PORT:-8001}:8001"
    env_file: .env
    environment:
      MCP_URL: http://mcp-wrapper:8000
      BRIDGE_PORT: "8001"
      HERMES_AGENT_DIR: /app/hermes-agent
      HERMES_HOME: /root/.hermes
      HERMES_MODEL: ${HERMES_MODEL:-}
      HERMES_BASE_URL: ${HERMES_BASE_URL:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
    depends_on:
      mcp-wrapper:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  upload-tmp:
